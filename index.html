<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe</title>
</head>

<body>
    <header>
        <!-- logo -->
        <img width="150px" src="images/logo_recipe.jpeg" alt="logo of recipe restaurant">
        <h1>Recipe House</h1>
    </header>
    <main>
        <!-- menu categories with items -->
        <section>
            <h2>Our Menu</h2>
        </section>
        <section>
            <img src="images/starter.jpeg" width="300px" height="320" alt="starter main image">
            <h2>Starters</h2>
            <ul>
                <li>French fries</li>
                <li>Garlic Bread</li>
            </ul>
        </section>
        <section>
            <img src="images/main-course.jpg" width="300px" height="320" alt="main course image">
            <h2>Main Course</h2>
            <ul>
                <li>Chicken Burger</li>
                <li>Beef Burger</li>
            </ul>
        </section>
        <section>
            <img src="images/drinks.jpg" width="300px" height="320" alt="drinks image">
            <h2>Drinks</h2>
            <ul>
                <li>Coke</li>
                <li>Lamonade</li>
            </ul>
        </section>
        <section>
            <img src="images/dessert.jpg" width="300px" height="320" alt="dessert image">
            <h2>Dessert</h2>
            <ul>
                <li>Ice Cream</li>
                <li>Cake</li>
            </ul>
        </section>

    </main>

</body>

</html>
